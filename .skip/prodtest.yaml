apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: matrikkel-dokument-generering
  namespace: matrikkel-prodtest
spec:
  image: "{{ image }}"
  port: 8087
  ingresses:
    - matrikkel-dokument-generering-prodtest.atkv3-prod.kartverket-intern.cloud
  replicas: 1

  accessPolicy:
    outbound:
      rules:
        - application: pdf-generator

  env:
    - name: GOTENBERG_URL
      value: "http://pdf-generator.matrikkel-prodtest:8089"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

  liveness:
    port: 8087
    path: /internal/isAlive
    initialDelay: 10
    failureThreshold: 6
  readiness:
    port: 8087
    path: /internal/isReady
    initialDelay: 10
    failureThreshold: 6
