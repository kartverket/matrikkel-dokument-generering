apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: matrikkel-dokument-generering
  namespace: matrikkel-main
spec:
  image: "{{ image }}"
  port: 8087
  ingresses:
    - matrikkel-dokument-generering.atkv3-dev.kartverket-intern.cloud
  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

  liveness:
    port: 8087
    path: /internal/isAlive
    initialDelay: 10
    failureThreshold: 6
  readiness:
    port: 8087
    path: /internal/isReady
    initialDelay: 10
    failureThreshold: 6
