openapi: 3.0.3
info:
  title: Matrikkel Dokument Generering API
  description: >-
    API for å generere PDF-dokumenter fra matrikkelrapporter. Tjenesten tar imot
    en strukturert JSON, renderer den til HTML og
    konverterer resultatet til PDF via [Gotenberg](https://github.com/kartverket/pdf-generator).

    Følgende rapporter støttes:
    - BYG0011 – Byggrapport
  version: 1.0.0
  license:
    name: Se LICENCE.md
    url: https://github.com/kartverket/matrikkel-dokument-generering/blob/main/LICENSE.md
servers:
  - url: http://localhost:3000
    description: Lokal utvikling
  - url: http://localhost:8087
    description: Container
# Tjenesten har ingen autentisering.
security: []
tags:
  - name: Dokument
    description: Generering av PDF-dokumenter
  - name: Internal
    description: Helsesjekk-endepunkter
paths:
  /create-document:
    post:
      tags:
        - Dokument
      summary: Generer PDF fra en byggrapport
      description: >-
        Validerer innsendt byggrapport mot skjemaet. Ved gyldig input renderes
        dokumentet til HTML og konverteres til PDF. Ved ugyldig input returneres
        valideringsfeil per felt.
      operationId: createDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ByggRapport"
      responses:
        "200":
          description: PDF-dokumentet ble generert.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Valideringen av byggrapporten feilet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "502":
          description: PDF-generering (Gotenberg) feilet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfErrorResponse"
  /internal/isAlive:
    get:
      tags:
        - Internal
      summary: Liveness-probe
      description: Returnerer alltid `OK` når prosessen kjører.
      operationId: isAlive
      responses:
        "200":
          description: Tjenesten kjører.
          content:
            text/plain:
              schema:
                type: string
                example: OK
  /internal/isReady:
    get:
      tags:
        - Internal
      summary: Readiness-probe
      description: Returnerer alltid `OK` når prosessen er klar til å ta imot trafikk.
      operationId: isReady
      responses:
        "200":
          description: Tjenesten er klar.
          content:
            text/plain:
              schema:
                type: string
                example: OK
components:
  schemas:
    ByggRapport:
      type: object
      description: Byggrapport (rapporttype BYG0011) som skal genereres til PDF.
      required:
        - rapportType
        - tittel
        - kommune
        - koordinatsystem
        - locale
        - generertTidspunkt
        - utvalgskriterier
        - bygninger
      properties:
        rapportType:
          type: string
          enum:
            - BYG0011
          description: Rapporttype. Må være `BYG0011`.
        tittel:
          type: string
          minLength: 1
        kommune:
          $ref: "#/components/schemas/Kommune"
        koordinatsystem:
          type: string
          minLength: 1
          example: EUREF89 UTM sone 32
        locale:
          $ref: "#/components/schemas/Locale"
        generertTidspunkt:
          type: string
          minLength: 1
          description: Tidspunkt rapporten ble generert (fritekst/ISO-streng).
          example: "2026-07-10T12:00:00Z"
        utvalgskriterier:
          $ref: "#/components/schemas/Utvalgskriterier"
        bygninger:
          type: array
          items:
            $ref: "#/components/schemas/Bygning"
    Locale:
      type: string
      description: Målform for dokumentet – bokmål (`nb`) eller nynorsk (`nn`).
      enum:
        - nb
        - nn
    Kommune:
      type: object
      required:
        - nr
        - navn
      properties:
        nr:
          type: string
          minLength: 1
          example: "0301"
        navn:
          type: string
          minLength: 1
          example: Oslo
    Utvalgskriterier:
      type: object
      required:
        - bestaaendeBygg
        - utgaatteBygg
        - bygninger
        - bygningsendringer
        - frededeBygninger
        - matrikkelenhet
        - subrapporter
      properties:
        bestaaendeBygg:
          type: boolean
        utgaatteBygg:
          type: boolean
        bygninger:
          type: boolean
        bygningsendringer:
          type: boolean
        frededeBygninger:
          type: string
          minLength: 1
        matrikkelenhet:
          $ref: "#/components/schemas/MatrikkelenhetGnrBnr"
        subrapporter:
          type: object
          required:
            - etasjer
            - bruksenheter
            - tiltakshavere
            - kontaktpersoner
            - hjemmelshavere
            - kulturminner
          properties:
            etasjer:
              type: boolean
            bruksenheter:
              type: boolean
            tiltakshavere:
              type: boolean
            kontaktpersoner:
              type: boolean
            hjemmelshavere:
              type: boolean
            kulturminner:
              type: boolean
    Bygning:
      type: object
      required:
        - id
        - bygningsnr
        - bygningstype
        - adresseverdig
        - naeringsgruppe
        - matrikkelenhet
        - endringer
      properties:
        id:
          type: number
        bygningsnr:
          type: string
          minLength: 1
        bygningstype:
          $ref: "#/components/schemas/Bygningstype"
        adresseverdig:
          type: boolean
        naeringsgruppe:
          type: string
          minLength: 1
        matrikkelenhet:
          type: string
          minLength: 1
          description: Matrikkelenhet som tekst (f.eks. "gnr/bnr").
        endringer:
          type: array
          items:
            $ref: "#/components/schemas/Bygningsendring"
    Bygningstype:
      type: object
      required:
        - kode
        - navn
      properties:
        kode:
          type: number
        navn:
          type: string
          minLength: 1
    Bygningsstatus:
      type: object
      required:
        - kode
        - kortkode
        - navn
        - bestaaende
      properties:
        kode:
          type: number
        kortkode:
          type: string
          minLength: 1
        navn:
          type: string
          minLength: 1
        bestaaende:
          type: boolean
    Bygningsendring:
      type: object
      required:
        - id
        - bygningId
        - lopenr
        - endringskode
        - bygningsstatus
        - antallBoenheter
        - bruksareal
        - bruttoareal
        - bebygdAreal
        - koordinat
        - datoer
        - etasjeplan
        - bruksenheter
        - hjemmelshavere
      properties:
        id:
          type: number
        bygningId:
          type: number
        lopenr:
          type: number
        endringskode:
          type: string
          nullable: true
        bygningsstatus:
          $ref: "#/components/schemas/Bygningsstatus"
        antallBoenheter:
          type: number
        bruksareal:
          $ref: "#/components/schemas/ArealFordeling"
        bruttoareal:
          $ref: "#/components/schemas/ArealFordeling"
        bebygdAreal:
          type: number
        koordinat:
          $ref: "#/components/schemas/Koordinat"
        datoer:
          $ref: "#/components/schemas/Bygningsdatoer"
        etasjeplan:
          type: array
          items:
            $ref: "#/components/schemas/Bygningsetasje"
        bruksenheter:
          type: array
          items:
            $ref: "#/components/schemas/Bruksenhet"
        tiltakshavere:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/Tiltakshaver"
        kontaktpersoner:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/Kontaktperson"
        hjemmelshavere:
          type: array
          items:
            $ref: "#/components/schemas/Hjemmelshaver"
        kulturminner:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/Kulturminne"
    ArealFordeling:
      type: object
      required:
        - bolig
        - annet
        - totalt
      properties:
        bolig:
          type: number
        annet:
          type: number
        totalt:
          type: number
    Koordinat:
      type: object
      required:
        - nord
        - ost
      properties:
        nord:
          type: number
        ost:
          type: number
    Bygningsdatoer:
      type: object
      required:
        - rammetillatelse
        - igangsettingstillatelse
        - midlertidigBrukstillatelse
        - ferdigattest
        - tattIBruk
        - utgaattRevet
      properties:
        rammetillatelse:
          type: string
          nullable: true
        igangsettingstillatelse:
          type: string
          nullable: true
        midlertidigBrukstillatelse:
          type: string
          nullable: true
        ferdigattest:
          type: string
          nullable: true
        tattIBruk:
          type: string
          nullable: true
        utgaattRevet:
          type: string
          nullable: true
    Bygningsetasje:
      type: object
      required:
        - etasjeplan
        - etasje
        - antallBoenheter
        - bruksareal
        - bruttoareal
      properties:
        etasjeplan:
          type: string
          minLength: 1
        etasje:
          type: number
        antallBoenheter:
          type: number
        bruksareal:
          $ref: "#/components/schemas/ArealFordeling"
        bruttoareal:
          $ref: "#/components/schemas/ArealFordeling"
    Bruksenhet:
      type: object
      required:
        - bruksenhetsnr
        - type
        - matrikkelenhet
        - bruksareal
        - antallRom
        - kjokkentilgang
        - antallBad
        - antallWc
        - adresse
        - egenregistrert
      properties:
        bruksenhetsnr:
          type: string
          nullable: true
        type:
          type: string
          minLength: 1
        matrikkelenhet:
          $ref: "#/components/schemas/MatrikkelenhetGnrBnr"
        bruksareal:
          type: number
        antallRom:
          type: number
        kjokkentilgang:
          type: boolean
          nullable: true
        antallBad:
          type: number
        antallWc:
          type: number
        adresse:
          type: string
          nullable: true
        egenregistrert:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/EgenregistrerteFelter"
    EgenregistrerteFelter:
      type: object
      required:
        - byggeaar
        - vannforsyning
        - avlop
        - energikilder
        - oppvarming
      properties:
        byggeaar:
          type: number
          nullable: true
        vannforsyning:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Egenregistrert"
        avlop:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Egenregistrert"
        energikilder:
          type: array
          items:
            $ref: "#/components/schemas/Egenregistrert"
        oppvarming:
          type: array
          items:
            $ref: "#/components/schemas/Egenregistrert"
    Egenregistrert:
      type: object
      required:
        - data
        - erGjeldende
        - gyldighetsperiode
      properties:
        data:
          type: string
          minLength: 1
        erGjeldende:
          type: boolean
        gyldighetsperiode:
          $ref: "#/components/schemas/Gyldighetsperiode"
    Gyldighetsperiode:
      type: object
      required:
        - gyldigFra
        - gyldigTil
      properties:
        gyldigFra:
          type: number
          nullable: true
        gyldigTil:
          type: number
          nullable: true
    Tiltakshaver:
      type: object
      required:
        - rolle
        - eierIdent
        - navn
        - adresselinje1
        - adresselinje2
        - adresselinje3
        - postnummeromradenr
        - postnummeromradenavn
        - land
        - bruksenhetsnr
        - datofra
        - datofraSOSI
        - kategorikode
        - kontaktpersonKode
        - statuskode
      properties:
        rolle:
          type: string
          minLength: 1
        eierIdent:
          type: string
          minLength: 1
        navn:
          type: string
          minLength: 1
        adresselinje1:
          type: string
          nullable: true
        adresselinje2:
          type: string
          nullable: true
        adresselinje3:
          type: string
          nullable: true
        postnummeromradenr:
          type: string
          nullable: true
        postnummeromradenavn:
          type: string
          nullable: true
        land:
          type: string
          nullable: true
        bruksenhetsnr:
          type: string
          nullable: true
        datofra:
          type: string
          nullable: true
        datofraSOSI:
          type: string
          nullable: true
        harDatofra:
          type: boolean
          default: false
        kategorikode:
          type: string
          nullable: true
        kontaktpersonKode:
          type: string
          nullable: true
        statuskode:
          type: string
          nullable: true
        eierErUtgatt:
          type: boolean
          default: false
    Kontaktperson:
      type: object
      description: Samme struktur som Tiltakshaver.
      required:
        - rolle
        - eierIdent
        - navn
        - adresselinje1
        - adresselinje2
        - adresselinje3
        - postnummeromradenr
        - postnummeromradenavn
        - land
        - bruksenhetsnr
        - datofra
        - datofraSOSI
        - kategorikode
        - kontaktpersonKode
        - statuskode
      properties:
        rolle:
          type: string
          minLength: 1
        eierIdent:
          type: string
          minLength: 1
        navn:
          type: string
          minLength: 1
        adresselinje1:
          type: string
          nullable: true
        adresselinje2:
          type: string
          nullable: true
        adresselinje3:
          type: string
          nullable: true
        postnummeromradenr:
          type: string
          nullable: true
        postnummeromradenavn:
          type: string
          nullable: true
        land:
          type: string
          nullable: true
        bruksenhetsnr:
          type: string
          nullable: true
        datofra:
          type: string
          nullable: true
        datofraSOSI:
          type: string
          nullable: true
        harDatofra:
          type: boolean
          default: false
        kategorikode:
          type: string
          nullable: true
        kontaktpersonKode:
          type: string
          nullable: true
        statuskode:
          type: string
          nullable: true
        eierErUtgatt:
          type: boolean
          default: false
    Hjemmelshaver:
      type: object
      required:
        - eierIdent
        - navn
        - andelTeller
        - andelNevner
        - eierforhold
        - adresselinje1
        - adresselinje2
        - adresselinje3
        - postnummer
        - poststed
        - land
        - statuskode
        - datofra
        - datotil
        - kategorikode
        - bruksenhetsnr
        - harAndel
        - erSelveier
        - matrikkelenhet
      properties:
        eierIdent:
          type: string
          minLength: 1
        navn:
          type: string
          minLength: 1
        andelTeller:
          type: number
          nullable: true
        andelNevner:
          type: number
          nullable: true
        eierforhold:
          type: string
          minLength: 1
        adresselinje1:
          type: string
          nullable: true
        adresselinje2:
          type: string
          nullable: true
        adresselinje3:
          type: string
          nullable: true
        postnummer:
          type: string
          nullable: true
        poststed:
          type: string
          nullable: true
        land:
          type: string
          nullable: true
        statuskode:
          type: string
          nullable: true
        eierErUtgatt:
          type: boolean
          default: false
        datofra:
          type: string
          nullable: true
        datotil:
          type: string
          nullable: true
        kategorikode:
          type: string
          nullable: true
        bruksenhetsnr:
          type: string
          nullable: true
        harAndel:
          type: boolean
          nullable: true
        erSelveier:
          type: boolean
          nullable: true
        matrikkelenhet:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MatrikkelenhetFull"
    Kulturminne:
      type: object
      required:
        - id
        - navn
        - status
        - kategori
      properties:
        id:
          type: string
          minLength: 1
        navn:
          type: string
          minLength: 1
        status:
          type: string
          minLength: 1
        kategori:
          type: string
          minLength: 1
    MatrikkelenhetGnrBnr:
      type: object
      required:
        - gnr
        - bnr
      properties:
        gnr:
          type: number
        bnr:
          type: number
    MatrikkelenhetFull:
      type: object
      required:
        - gnr
        - bnr
        - fnr
        - snr
      properties:
        gnr:
          type: number
        bnr:
          type: number
        fnr:
          type: number
          nullable: true
        snr:
          type: number
          nullable: true
    ValidationErrorResponse:
      type: object
      description: >-
        Returneres med HTTP 400 når byggrapporten ikke passerer validering.
        `errors.errors` er et objekt hvor hver nøkkel er et feltnavn og verdien
        er en liste med feilmeldinger for det feltet.
      required:
        - errors
      properties:
        errors:
          type: object
          required:
            - valid
            - errors
          properties:
            valid:
              type: boolean
              enum:
                - false
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
              example:
                tittel:
                  - Title is required
    PdfErrorResponse:
      type: object
      description: Returneres med HTTP 502 når konvertering til PDF feiler.
      required:
        - error
        - details
      properties:
        error:
          type: string
          example: PDF-generering feilet
        details:
          type: string
          example: "Gotenberg svarte med 500: ..."
