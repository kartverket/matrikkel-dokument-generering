version: 2

registries:
  dockerhub-hardened-images:
    type: docker-registry
    url: https://dhi.io
    username: ${{ vars.DOCKERHUB_USERNAME }}
    password: ${{ secrets.DOCKERHUB_TOKEN }}

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: "weekly"
      day: "sunday"
    groups:
      all-github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    registries:
      - dockerhub-hardened-images
    schedule:
      interval: "weekly"
      day: "sunday"