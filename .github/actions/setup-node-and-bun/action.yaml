name: Setup bun and node
description: Setup bun and node

runs:
  using: composite

  steps:
    - name: Setup bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14

    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 24