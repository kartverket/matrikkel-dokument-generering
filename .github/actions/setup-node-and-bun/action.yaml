name: Setup bun and node
description: Setup bun and node

runs:
  using: composite

  steps:
    - name: Setup bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24