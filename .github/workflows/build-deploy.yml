name: Build and deploy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

env:
  image_registry: ghcr.io
  image_name: ${{ github.repository }}

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-string.outputs.version }}
      image: ${{ steps.version-string.outputs.image }}

    steps:
      - name: Generate version string
        id: version-string
        shell: bash
        run: |
          version="$(date -u '+%Y.%m.%d-%H.%M')-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/kartverket/matrikkel-pdf-generering:${version}" >> "$GITHUB_OUTPUT"
  package-image:
    name: Verify, Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v7

      - name: "Setup node and bun"
        uses: ./.github/actions/setup-node-and-bun

      - name: "Audit dependencies"
        if: ${{ !github.event.inputs.bypassValidation }}
        run: bun audit --production --audit-level=high

      - name: "Install dependencies"
        run: bun install --legacy-peer-deps

      - name: "Verify linting"
        if: ${{ !github.event.inputs.bypassValidation }}
        run: bun run lint

      - name: "Build"
        run: bun run build

      - name: Build and push docker
        id: docker
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == 'main'
        uses: ./.github/actions/build-push-docker
        with:
          dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

    outputs:
      image_name: ${{ steps.docker.outputs.image_name }}
      image_tag: ${{ steps.docker.outputs.image_tag }}
      image_digest: ${{ steps.docker.outputs.image_digest }}

  deploy-dev:
    name: "Deploy Dev"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - version
      - package-image
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Deploy to Dev
        uses: kartverket/matrikkel-actions/heimdall-deploy@main
        with:
          cluster: "atkv3-dev"
          resource: ".skip/dev.yaml"
          var: |
            image=${{ needs.version.outputs.image }},version=${{ needs.version.outputs.version }}

  run-pharos:
    needs: [package-image]
    name: Run Pharos
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == 'main'
    permissions:
      actions: read
      packages: read
      contents: read
      security-events: write
    steps:
      - name: "Run Pharos"
        uses: kartverket/pharos@599d3fe4af8bae19fbfda831662e90ee1c406ec2 # v0.6.3
        with:
          image_url: ${{ needs.build.outputs.image_name }}@${{ needs.build.outputs.image_digest }}
          disable_severity_check: true
